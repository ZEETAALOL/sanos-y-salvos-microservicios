server.port=3005
spring.application.name=bff

# URLs de los microservicios internos
microservicios.usuarios.url=http://localhost:3004
microservicios.mascotas.url=http://localhost:3001
microservicios.geolocalizacion.url=http://localhost:3002
microservicios.motor.url=http://localhost:3003

# Sin compresion — evita conflictos con el proxy de Vite
server.compression.enabled=false

# Timeout para peticiones proxeadas (30 segundos)
spring.mvc.async.request-timeout=30000

# Limite de tamaño — el BFF recibe y reenvía los bodies con fotos base64
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB

# Sin JPA ni datasource en el BFF
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
