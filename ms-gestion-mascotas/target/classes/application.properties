server.port=3001
spring.application.name=ms-gestion-mascotas

spring.datasource.url=jdbc:mysql://localhost:3306/sanos_y_salvos_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP — pool de conexiones
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connectionInitSql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JSON snake_case (coherente con el frontend)
spring.jackson.property-naming-strategy=SNAKE_CASE

# JWT
jwt.secret=sanos-y-salvos-secret-2026
jwt.expiration=86400000

# Limite de tamaño del body — necesario para fotos en base64 (pueden ser 3-5 MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB
